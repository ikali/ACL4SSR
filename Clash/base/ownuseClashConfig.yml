#---------------------------------------------------#
# 配置文件需要放置在 $HOME/.config/clash/config.yml
# 或者运行目录下的config.yml
#---------------------------------------------------#

port: 7890
ipv6: false
log-level: silent
external-controller: 127.0.0.1:9090
external-ui: ui

# 列表外域名使用国内 dns 解析，解析结果为国外 IP/无 IP 的，则使用国外 dns 再解析一次，速度快，dns 有泄露。
但污染后若返回国内 IP 则无法触发 fallback 组重新解析。

dns:
  enable: true
  listen: 127.0.0.1:53
  nameserver: [https://doh.pub/dns-query]
  fallback: [https://v.recipes/dns-ecs#Proxy]
  fallback-filter: {geoip: true, geoip-code: CN, ipcidr: ["0.0.0.0/32", "127.0.0.1/32", "240.0.0.0/4"]}
hosts:
  doh.pub: [1.12.12.12]
