;在Clash配置文件中proxies的生成风格
clash_proxies_style=flow
clash_proxy_groups_style=flow

;用于包含或排除节点关键词的选项会覆盖主程序目录中的配置文件里的内容
include_remarks=(日本|🇯🇵|JP|Japan|港|🇭🇰|HK|Kong|新加坡|狮城|🇸🇬|SG|Singapore|美国|🇺🇸|US|America|United.*?States|(?i)0[.x×]|s4|s801)
exclude_remarks=(AUS|中国|ソフトバンク|オプテージ|auひかり|海|油尖旺|高级|PVCC|Magic|(?<=v1).*(日本・|香港・|美国・)|(日本|香港|新加坡).*?线路|CDN|BT|(?:(?i)(?<!\\.)1.[4-9])|(?:(?i)(?<!\\.)[2-9][.x×])|(?:(?i)(?<!\\.)0?([3-9]|[1-9][0-9])))

;用于自定义重命名的选项 会覆盖 pref.ini 里的内容
rename=JMS-\d+@c\d+s4\.portablesubmarines\.com:\d+@🇯🇵 SoftBank s4
rename=JMS-\d+@c\d+s801\.portablesubmarines\.com:\d+@🇸🇬 s801 0.1x

;自定义规则
enable_rule_generator=false
overwrite_original_rules=false

;自定义基础配置
clash_rule_base=https://raw.githubusercontent.com/ikali/ACL4SSR/main/Clash/base/ClashConfig.yml
